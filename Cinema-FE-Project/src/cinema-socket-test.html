<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Cinema Booking</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .screen {
            margin: 40px auto;
            width: 60%;
            height: 60px;
            background: linear-gradient(to bottom, #eee, #aaa);
            border-radius: 5px;
            color: black;
            line-height: 60px;
            font-weight: bold;
        }

        .cinema {
            width: 500px;
            margin: auto;
        }

        .row {
            display: flex;
            justify-content: center;
            margin: 8px;
        }

        .seat {
            width: 40px;
            height: 40px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .normal {
            background: #64748b;
        }

        .vip {
            background: #f59e0b;
        }

        .couple {
            background: #a855f7;
        }

        .selected {
            background: #22c55e;
        }

        .hold {
            background: #fb923c;
        }

        .sold {
            background: #ef4444;
            cursor: not-allowed;
        }

        .controls {
            margin-top: 30px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 400px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .join {
            background: #3b82f6;
            color: white;
        }

        .holdBtn {
            background: #f59e0b;
            color: black;
        }

        .confirmBtn {
            background: #22c55e;
            color: black;
        }

        .log {
            margin-top: 20px;
            background: black;
            padding: 10px;
            height: 200px;
            overflow: auto;
        }

        .legend {
            margin-top: 20px;
        }

        .legend span {
            display: inline-block;
            margin: 5px 15px;
        }

        .box {
            width: 15px;
            height: 15px;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>

<body>

    <h1>🎬 Cinema Seat Booking</h1>

    <div class="screen">SCREEN</div>

    <div class="cinema" id="cinema"></div>

    <div class="legend">

        <span>
            <div class="box normal"></div>Normal
        </span>
        <span>
            <div class="box vip"></div>VIP
        </span>
        <span>
            <div class="box couple"></div>Couple
        </span>
        <span>
            <div class="box selected"></div>Selected
        </span>
        <span>
            <div class="box hold"></div>Held
        </span>
        <span>
            <div class="box sold"></div>Sold
        </span>

    </div>

    <div class="controls">

        <div>
            <label>Showtime UUID</label><br>
            <input id="showtimeUUID">
            <button class="join" onclick="joinRoom()">Join Room</button>
        </div>

        <div>
            <label>Seat UUIDs</label><br>
            <input id="seatUUIDs">
        </div>

        <div>
            <label>JWT Token</label><br>
            <input id="token">
        </div>

        <br>

        <button class="holdBtn" onclick="holdSeats()">Hold Seats</button>
        <button class="confirmBtn" onclick="confirmBooking()">Confirm Booking</button>

    </div>

    <h3>Realtime Log</h3>
    <div id="log" class="log"></div>


    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>

        const socket = io("https://cinema-ticket-booking-system-3.onrender.com");

        const cinema = document.getElementById("cinema");

        const seatsLayout = [
            { row: "A", count: 10, type: "normal" },
            { row: "B", count: 10, type: "vip" },
            { row: "C", count: 5, type: "couple" }
        ];

        let selectedSeats = [];

        function createSeats() {

            seatsLayout.forEach(r => {

                const rowDiv = document.createElement("div");
                rowDiv.className = "row";

                for (let i = 1; i <= r.count; i++) {

                    const seat = document.createElement("div");

                    seat.className = `seat ${r.type}`;

                    seat.innerText = r.row + i;

                    seat.dataset.uuid = r.row + i; // 🔥 tạm dùng seatNumber thay uuid

                    seat.onclick = () => toggleSeat(seat);

                    rowDiv.appendChild(seat);

                }

                cinema.appendChild(rowDiv);

            });

        }

        createSeats();


        function toggleSeat(seat) {

            if (seat.classList.contains("sold")) return;

            const uuid = seat.dataset.uuid;

            if (seat.classList.contains("selected")) {

                seat.classList.remove("selected");
                selectedSeats = selectedSeats.filter(s => s !== uuid);

            } else {

                seat.classList.add("selected");
                selectedSeats.push(uuid);

            }

            document.getElementById("seatUUIDs").value = selectedSeats.join(",");

        }


        // SOCKET

        socket.on("connect", () => {
            log("Connected " + socket.id);
        });


        function joinRoom() {

            const showtimeUUID = document.getElementById("showtimeUUID").value;

            socket.emit("join-showtime", showtimeUUID);

            log("Joined " + showtimeUUID);

        }


        // HOLD

        function holdSeats() {

            const showtimeUUID = document.getElementById("showtimeUUID").value;
            const seatUUIDs = selectedSeats;
            const token = document.getElementById("token").value;

            fetch("https://cinema-ticket-booking-system-3.onrender.com/api/seat/hold", {

                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ showtimeUUID, seatUUIDs })

            })
                .then(res => res.json())
                .then(data => log("Hold: " + JSON.stringify(data)));

        }


        // CONFIRM

        function confirmBooking() {

            const showtimeUUID = document.getElementById("showtimeUUID").value;
            const seatUUIDs = selectedSeats;
            const token = document.getElementById("token").value;

            fetch("https://cinema-ticket-booking-system-3.onrender.com/api/seat/confirm", {

                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ showtimeUUID, seatUUIDs })

            })
                .then(res => res.json())
                .then(data => log("Confirm: " + JSON.stringify(data)));

        }


        // REALTIME EVENTS

        socket.on("seat-held", (data) => {

            log("🟡 Seat Held " + JSON.stringify(data));

        });

        socket.on("seat-sold", (data) => {

            log("🟢 Seat Sold " + JSON.stringify(data));

        });


        function log(message) {

            const div = document.getElementById("log");
            div.innerHTML += "<p>" + message + "</p>";
            div.scrollTop = div.scrollHeight;

        }

    </script>

</body>

</html>
